# Catppuccin Mocha theme for Starship
# Palette colors from Catppuccin Mocha
palette = "catppuccin_mocha"

# Format
format = """
[](surface0)\
$os\
$username\
[](bg:peach fg:surface0)\
$directory\
[](fg:peach bg:green)\
$git_branch\
$git_status\
[](fg:green bg:teal)\
$nodejs\
$rust\
$golang\
$php\
$python\
$java\
[](fg:teal bg:blue)\
$docker_context\
[](fg:blue bg:purple)\
$time\
[ ](fg:purple)\
$line_break$character"""

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Arch = "󰣇"
Linux = "󰌽"

[username]
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = '[ $user ]($style)'

[directory]
style = "fg:mantle bg:peach"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:green fg:mantle"
format = '[[ $symbol $branch ](fg:mantle bg:green)]($style)'

[git_status]
style = "bg:green fg:mantle"
format = '[[($all_status$ahead_behind )](fg:mantle bg:green)]($style)'

[nodejs]
symbol = ""
style = "bg:teal fg:mantle"
format = '[[ $symbol( $version) ](fg:mantle bg:teal)]($style)'
detect_files = ["package.json", ".node-version", "package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]

[rust]
symbol = ""
style = "bg:teal fg:mantle"
format = '[[ $symbol( $version) ](fg:mantle bg:teal)]($style)'
detect_files = ["Cargo.toml"]

[golang]
symbol = ""
style = "bg:teal fg:mantle"
format = '[[ $symbol( $version) ](fg:mantle bg:teal)]($style)'
detect_files = ["go.mod", "go.sum"]

[php]
symbol = ""
style = "bg:teal fg:mantle"
format = '[[ $symbol( $version) ](fg:mantle bg:teal)]($style)'
detect_files = ["composer.json"]

[python]
symbol = ""
style = "bg:teal fg:mantle"
format = '[[ $symbol( $version) ](fg:mantle bg:teal)]($style)'
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile", "poetry.lock"]
detect_folders = ["venv", ".venv"]

[java]
symbol = ""
style = "bg:teal fg:mantle"
format = '[[ $symbol( $version) ](fg:mantle bg:teal)]($style)'
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts"]

[docker_context]
symbol = ""
style = "bg:blue fg:mantle"
format = '[[ $symbol( $context) ](fg:mantle bg:blue)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:purple fg:mantle"
format = '[[  $time ](fg:mantle bg:purple)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[➜](bold fg:green)'
error_symbol = '[➜](bold fg:red)'
vimcmd_symbol = '[](bold fg:green)'
vimcmd_replace_one_symbol = '[](bold fg:purple)'
vimcmd_replace_symbol = '[](bold fg:purple)'
vimcmd_visual_symbol = '[](bold fg:lavender)'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
purple = "#cba6f7"
